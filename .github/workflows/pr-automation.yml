name: PR Automation Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint checks
        id: eslint
        run: npm run lint
        continue-on-error: true

      - name: Run Prettier formatting checks
        id: prettier
        run: npx prettier --check .
        continue-on-error: true

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        id: code-quality-comment
        with:
          script: |
            const eslintOutput = `${{ steps.eslint.outputs.stdout }}`;
            const prettierOutput = `${{ steps.prettier.outputs.stdout }}`;
            const comment = `
            ## Code Quality Report
            
            ### ESLint Results
            \`\`\`
            ${eslintOutput}
            \`\`\`
            
            ### Prettier Results
            \`\`\`
            ${prettierOutput}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        id: test
        run: npm test
        continue-on-error: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        id: test-coverage-comment
        with:
          script: |
            const testOutput = `${{ steps.test.outputs.stdout }}`;
            const comment = `
            ## Test Coverage Report
            
            \`\`\`
            ${testOutput}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability checks
        id: npm-audit
        run: npm audit
        continue-on-error: true

      - name: Scan for secrets in code changes
        id: trufflehog
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
        continue-on-error: true

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        id: security-comment
        with:
          script: |
            const npmAuditOutput = `${{ steps.npm-audit.outputs.stdout }}`;
            const trufflehogOutput = `${{ steps.trufflehog.outputs.stdout }}`;
            const comment = `
            ## Security Scan Report
            
            ### Dependencies Vulnerabilities (npm audit)
            \`\`\`
            ${npmAuditOutput}
            \`\`\`
            
            ### Secrets Scan (TruffleHog)
            \`\`\`
            ${trufflehogOutput}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Attempt to build the application
        id: build
        run: npm run build
        continue-on-error: true

      - name: Validate all endpoints are accessible
        id: validate-endpoints
        run: |
          # Start the application in the background
          npm start &
          # Wait for the server to start (adjust sleep time if needed)
          sleep 10
          # Check if the main endpoint is accessible
          curl -I http://localhost:3000
        continue-on-error: true

      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: dist/

      - name: Post Build Validation Report
        uses: actions/github-script@v7
        id: build-comment
        with:
          script: |
            const buildOutput = `${{ steps.build.outputs.stdout }}`;
            const validateOutput = `${{ steps.validate-endpoints.outputs.stdout }}`;
            const comment = `
            ## Build Validation
            
            ### Build Results
            \`\`\`
            ${buildOutput}
            \`\`\`
            
            ### Endpoint Validation Results
            \`\`\`
            ${validateOutput}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
